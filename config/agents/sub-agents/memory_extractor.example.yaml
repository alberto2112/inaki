id: memory_extractor
name: Memory Extractor
description: |
  Extracts relevant memories from a conversation history and returns them
  as structured JSON. Invoked once by the parent agent's memory consolidation
  process.

# system_prompt: OPCIONAL.
# Si lo omitís (como acá), el extractor hereda las instrucciones por defecto
# `_EXTRACTOR_INSTRUCTIONS`, hardcodeadas en core/use_cases/consolidate_memory.py
# — única fuente de verdad, sin duplicación. Declará un `system_prompt:` propio
# acá SOLO si querés sobreescribir ese default por completo.

memories:
  consolidation:
    enabled: false

llm:
  provider: "openai"
  model: "gpt-5.4-mini-2026-03-17"
  temperature: 0.1
  max_tokens: 65535

tools:
  tool_call_max_iterations: 1
