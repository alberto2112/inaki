id: memory_reconciler
name: Memory Reconciler
description: |
  Reconciles a cluster of related memories, identifying contradictions,
  outdated facts, or redundancies. Invoked once per cluster by the parent
  agent's memory reconciliation process (ReconcileMemoryUseCase).

# system_prompt: OPCIONAL.
# Si lo omitís (como acá), el reconciliador hereda el prompt por defecto
# `_RECONCILER_PROMPT`, hardcodeado en core/use_cases/reconcile_memory.py —
# única fuente de verdad, sin duplicación. Declará un `system_prompt:` propio
# acá SOLO si querés sobreescribir ese default por completo.

memories:
  consolidation:
    enabled: false

llm:
  provider: "openai"
  model: "gpt-5.4-mini-2026-03-17"
  temperature: 0.1
  max_tokens: 65535

tools:
  tool_call_max_iterations: 1
