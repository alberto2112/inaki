# =============================================================================
# Iñaki v2 — Configuración Global de Referencia
# =============================================================================
#
# Este fichero documenta TODOS los parámetros configurables del sistema.
# No es leído directamente — sirve como referencia canónica.
#
# Configuración real: config/global.yaml + config/agents/{id}.yaml
# Secrets: config/global.secrets.yaml + config/agents/{id}.secrets.yaml
#          (nunca commitear *.secrets.yaml — están en .gitignore)
#
# Sistema de merge (4 capas, campo a campo):
#   config/global.yaml
#       ↓
#   config/global.secrets.yaml
#       ↓
#   config/agents/{id}.yaml
#       ↓
#   config/agents/{id}.secrets.yaml
#       ↓
#   AgentConfig resuelto
# =============================================================================


# -----------------------------------------------------------------------------
# [providers] — Registry top-level de proveedores (credenciales compartidas)
# -----------------------------------------------------------------------------
#
# Single source of truth para `api_key` y `base_url` por vendor. Las features
# (`llm`, `embedding`, `transcription`, `memory.llm`) NO declaran credenciales
# — solo referencian una entrada de este registry por nombre vía `provider: <key>`.
#
# Cada entrada soporta:
#   type:     nombre del adapter. Si es ausente, se resuelve a la KEY del dict.
#             Solo se explicita para multi-instance (p. ej. dos creds de Groq).
#   api_key:  credencial del vendor. Opcional para providers locales
#             (ollama, e5_onnx) que no la requieren.
#   base_url: override del default hardcoded del adapter. Opcional.
#
# El bloque es strict (`extra="forbid"`) para atrapar typos temprano.
#
# Ejemplo típico — 3 vendors remotos + ollama local:
#
#   providers:
#     groq:       { api_key: "gsk_...",  base_url: "https://api.groq.com/openai/v1" }
#     openai:     { api_key: "sk-..." }
#     openrouter: { api_key: "sk-or-..." }
#     # ollama: no requiere entrada, usa default http://localhost:11434
#
# Multi-instance (billing separado con el mismo adapter):
#
#   providers:
#     groq:      { api_key: "gsk_personal..." }
#     groq-work: { type: groq, api_key: "gsk_work..." }
#
# En este caso `llm.provider: groq-work` apunta al adapter groq con creds
# corporativas. Las entradas coexisten sin pisarse.
#
# Las credenciales reales viven en `global.secrets.yaml` — este archivo es
# solo referencia. Si definís `providers.groq.api_key: K` en `global.yaml`,
# se mergea normalmente con los secrets (el secrets layer gana en conflicto).
providers: {}


# -----------------------------------------------------------------------------
# [app] — Configuración general del sistema
# -----------------------------------------------------------------------------
app:
  name: "Iñaki"               # Nombre del asistente (usado en logs y presentaciones)

  log_level: "INFO"           # Nivel de log: DEBUG | INFO | WARNING | ERROR | CRITICAL
                              # DEBUG muestra llamadas HTTP, embeddings, tool calls

  default_agent: "general"    # Agente usado por CLI sin flag --agent
                              # Debe coincidir con un archivo en config/agents/


# -----------------------------------------------------------------------------
# [llm] — Proveedor de lenguaje (LLM)
# -----------------------------------------------------------------------------
llm:
  provider: "openrouter"      # KEY del `providers:` registry que provee las creds.
                              # Opciones nativas: openrouter, openai, ollama, groq.
                              # Añadir nuevo proveedor: crear
                              # adapters/outbound/providers/{name}.py con
                              # PROVIDER_NAME = "{name}" (descubrimiento automático)
                              # y declarar `providers.{name}` con las creds.

  model: "anthropic/claude-3-5-haiku"
                              # Modelo a usar. Ejemplos:
                              #   OpenRouter:  "anthropic/claude-3-5-haiku"
                              #                "anthropic/claude-sonnet-4-5"
                              #                "google/gemini-flash-1.5"
                              #                "meta-llama/llama-3.1-8b-instruct"
                              #   OpenAI:      "gpt-4o-mini", "gpt-4o"
                              #   Ollama:      "llama3.2", "mistral", "phi3"
                              #   Groq:        "llama3-8b-8192", "mixtral-8x7b-32768"

  temperature: 0.7            # Creatividad del modelo (0.0 = determinista, 1.0 = muy creativo)
                              # Recomendado: 0.3-0.5 para tareas de código, 0.7-0.9 para conversación

  max_tokens: 2048            # Máximo de tokens en la respuesta
                              # Aumentar para respuestas largas (código, análisis)
                              # Considerar coste en Pi 5 con modelos locales

  # Las credenciales NO van acá — se resuelven desde `providers.{provider}`.


# -----------------------------------------------------------------------------
# [embedding] — Modelo de embeddings para RAG
# -----------------------------------------------------------------------------
embedding:
  provider: "e5_onnx"         # KEY del `providers:` registry. Opciones:
                              #   "e5_onnx" — multilingual-e5-small via ONNX Runtime.
                              #               Local, no requiere entrada en providers.
                              #               Recomendado para Pi 5.
                              #   "openai"  — text-embedding-3-small vía OpenAI.
                              #               Requiere `providers.openai.api_key`.

  model_dirname: "models/e5-small"
                              # Directorio con los archivos del modelo ONNX, relativo
                              # a ~/.inaki/. Si se pone absoluto, se usa tal cual.
                              # Estructura esperada:
                              #   ~/.inaki/models/e5-small/model.onnx
                              #   ~/.inaki/models/e5-small/tokenizer.json
                              # Descargar desde HuggingFace: intfloat/multilingual-e5-small

  dimension: 384              # Dimensión del vector de embedding
                              # multilingual-e5-small → 384 (no cambiar)
                              # ⚠ Cambiar esto requiere borrar y recrear la DB de memorias

  cache_filename: "data/embedding_cache.db"
                              # Fichero SQLite del cache de embeddings, relativo a
                              # ~/.inaki/. Si se pone absoluto, se usa tal cual.


# -----------------------------------------------------------------------------
# [memory] — Memoria a largo plazo (SQLite + sqlite-vec)
# -----------------------------------------------------------------------------
memory:
  db_filename: "data/inaki.db"  # Fichero SQLite relativo a ~/.inaki/.
                              # Si se pone absoluto, se usa tal cual.
                              # Contiene tablas: memories, memory_embeddings (vec0)
                              # Memoria GLOBAL: compartida entre todos los agentes

  default_top_k: 5            # Número de recuerdos recuperados por RAG en cada turno
                              # Aumentar para más contexto (mayor coste de tokens)
                              # Disminuir para respuestas más rápidas

  digest_size: 14             # Nº de recuerdos más recientes volcados al digest markdown
                              # tras cada /consolidate. Orden: created_at DESC.

  digest_filename: "mem/last_memories.md"
                              # Fichero markdown leído por el prompt builder en cada
                              # turno, relativo a ~/.inaki/. Si se pone absoluto, se
                              # usa tal cual.

  min_relevance_score: 0.5    # Umbral mínimo (0.0-1.0) para persistir un recuerdo
                              # extraído por el LLM.

  schedule: "0 3 * * *"       # Cron para la consolidación global nocturna
                              # (una sola tarea que itera todos los agentes).

  delay_seconds: 2            # Pausa (segundos) entre agente y agente durante
                              # la consolidación global. Evita rate-limits.

  keep_last_messages: 0       # Mensajes a preservar por agente tras una
                              # consolidación exitosa. 0 = usar fallback (84).

  # channels_infused: null    # Lista de canales cuyos mensajes SÍ se consolidan
                              # a memoria a largo plazo. null/omitido = todos.
                              # Ejemplo típico para multi-agente en Telegram:
                              #   channels_infused: ["telegram"]
                              # Excluye explícitamente un canal poniendo solo los
                              # que querés infundir. Filtra `load_uninfused` en el
                              # cron de consolidación — NO afecta al hot-path RAG.

  # enabled: true             # Flag PER-AGENT — va en agents/{id}.yaml, NO acá

  # ---------------------------------------------------------------------------
  # [memory.llm] — LLM dedicado para la consolidación (OPCIONAL)
  # ---------------------------------------------------------------------------
  # Permite usar un LLM DISTINTO al del agente (llm.*) SOLO para consolidar la
  # memoria. Cada campo que definas acá pisa al de `llm.*`; los campos ausentes
  # se heredan. Si cambiás `provider`, las credenciales se resuelven desde el
  # registry `providers.{nuevo_provider}` — no van acá.
  #
  # Semántica:
  #   - clave AUSENTE → hereda el valor de `llm.*`.
  #   - clave con valor `null` → override EXPLÍCITO (fuerza None).
  #
  # Validación: si el provider del override requiere creds y no hay entrada en
  # `providers:` con `api_key`, el arranque falla con ConfigError.
  #
  # Ejemplo — chat con un reasoning model, consolidación con uno no-reasoning:
  #
  # providers:
  #   groq:   { api_key: "gsk_..." }
  #   openai: { api_key: "sk-..." }
  #
  # llm:                      # (base, para el chat)
  #   provider: groq
  #   model: openai/gpt-oss-120b
  #   reasoning_effort: high
  #   max_tokens: 2048
  #
  # memory:
  #   llm:                    # (override, para consolidación)
  #     provider: openai      # cambia vendor → creds resueltas desde providers.openai
  #     model: gpt-4o-mini
  #     reasoning_effort: null
  #     max_tokens: 8192


# -----------------------------------------------------------------------------
# [chat_history] — Historial de conversación a corto plazo (SQLite)
# -----------------------------------------------------------------------------
chat_history:
  db_filename: "data/history.db"  # Fichero SQLite relativo a ~/.inaki/.

  max_messages: 21            # Últimos N mensajes inyectados al LLM (0 = sin límite)

  merge_chats: false          # Política de aislamiento del historial.
                              #   false (default) — el agente solo ve los mensajes
                              #     del par (channel, chat_id) actual. Privado de
                              #     Telegram, grupo y CLI quedan aislados entre sí.
                              #   true — el agente comparte un solo historial entre
                              #     todos los canales y chats. Útil si querés que
                              #     el contexto de una conversación privada esté
                              #     disponible cuando el agente responde en grupo.


# -----------------------------------------------------------------------------
# [tools] — Configuración de selección de tools vía semantic routing
# -----------------------------------------------------------------------------
tools:
  semantic_routing_min_tools: 10
  semantic_routing_top_k: 5
  semantic_routing_min_score: 0.0
  sticky_ttl: 3
  tool_call_max_iterations: 5
  circuit_breaker_threshold: 2


# -----------------------------------------------------------------------------
# [skills] — Configuración de selección de skills vía semantic routing
# -----------------------------------------------------------------------------
skills:
  semantic_routing_min_skills: 10
  semantic_routing_top_k: 3
  semantic_routing_min_score: 0.0
  sticky_ttl: 3


# -----------------------------------------------------------------------------
# [semantic_routing] — Políticas transversales al pipeline
# -----------------------------------------------------------------------------
semantic_routing:
  min_words_threshold: 0


# -----------------------------------------------------------------------------
# [workspace] — Directorio de trabajo del agente (sandbox de las tools de FS)
# -----------------------------------------------------------------------------
workspace:
  path: "~/inaki-workspace"
  containment: "strict"       # "strict" | "warn" | "off"


# -----------------------------------------------------------------------------
# [delegation] — Delegación agente-a-agente (defaults globales)
# -----------------------------------------------------------------------------
# delegation:
#   max_iterations_per_sub: 10
#   timeout_seconds: 60


# -----------------------------------------------------------------------------
# [admin] — Admin server del daemon (endpoints de gestión)
# -----------------------------------------------------------------------------
admin:
  host: "127.0.0.1"
  port: 6497
  chat_timeout: 300.0
  # auth_key: "clave-secreta"   # → global.secrets.yaml


# -----------------------------------------------------------------------------
# [transcription] — Proveedor de transcripción de audio (voz en Telegram)
# -----------------------------------------------------------------------------
#
# Habilita la transcripción de mensajes de voz, audio y video_note en el canal
# de Telegram. Se activa cuando `channels.telegram.voice_enabled: true` en el
# agente (default).
#
# Las credenciales se resuelven desde `providers.{provider}` — no van acá.
#
# transcription:
#   provider: "groq"            # KEY del `providers:` registry que provee creds.
#   model: "whisper-large-v3-turbo"
#   language: "es"              # ISO-639-1 opcional; null = autodetect
#   timeout_seconds: 60
#   max_audio_mb: 25


# -----------------------------------------------------------------------------
# [user] — Preferencias del usuario
# -----------------------------------------------------------------------------
user:
  # timezone: "America/Argentina/Buenos_Aires"
                                # Vacío/omitido → autodetect desde host (tzlocal)


# -----------------------------------------------------------------------------
# [knowledge] — Fuentes de conocimiento externas (RAG sobre documentos)
# -----------------------------------------------------------------------------
#
# knowledge:
#   enabled: true
#   include_memory: true
#   top_k_per_source: 3
#   min_score: 0.5
#   max_total_chunks: 10
#   token_budget_warn_threshold: 4000
#   sources:
