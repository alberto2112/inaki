#       type: document
#       enabled: true
#       description: "Project documentation (markdown and PDF)"
#       path: ~/proyecto/docs/
#       glob: "**/*.md"
#       chunk_size: 500
#       chunk_overlap: 80
#       top_k: 3
#       min_score: 0.5


# -----------------------------------------------------------------------------
# [photos] — Pipeline de reconocimiento facial y descripción de escena
# -----------------------------------------------------------------------------
#
# Habilita el procesamiento de fotos enviadas al bot de Telegram:
#   - Reconocimiento facial con InsightFace (local, no requiere API key)
#   - Descripción de escena con un proveedor LLM multimodal (Anthropic/OpenAI/Groq)
#   - Base de datos de personas en ~/.inaki/data/faces.db
#   - Registro persistente de caras ("ignoradas" y conocidas)
#
# ⚠ ADVERTENCIA DE MEMORIA: InsightFace ocupa ~400MB de RAM una vez cargado.
#   Se carga de forma lazy (en la primera foto recibida).
#   Si el agente no procesa fotos por períodos prolongados, reiniciar el daemon
#   para liberar memoria en Pi 5 (4GB RAM).
#
# ⚠ CAMBIO DE MODELO: Cambiar `faces.model` invalida faces.db.
#   Procedimiento: detener daemon → borrar ~/.inaki/data/faces.db → reiniciar.
#   Todas las caras registradas se pierden — volver a enrolar.
#
# photos:
#   enabled: true                # false → bot ignora fotos, no carga modelos
#
#   enrollment_chats: private    # Dónde el agente ofrece registrar caras:
#                                #   "private" → solo en chats privados
#                                #   "none"    → nunca ofrece enrolar
#
#   faces:
#     provider: insightface      # Único provider soportado actualmente
#     model: buffalo_sc          # Modelo InsightFace:
#                                #   buffalo_sc → rápido, liviano (~200MB descarga)
#                                #   buffalo_s  → más preciso, algo más pesado
#                                #   buffalo_l  → máxima precisión, ~1GB
#     match_threshold: 0.55      # Similitud coseno mínima para → MATCHED
#     ambiguous_threshold: 0.40  # Similitud entre ambos → AMBIGUOUS (pedir confirmación)
#
#   scene:
#     provider: anthropic        # Proveedor LLM multimodal para describir la escena:
#                                #   "anthropic" → Messages API con content type image
#                                #   "openai"    → Chat Completions con image_url base64
#                                #   "groq"      → OpenAI-compatible endpoint de Groq
#     model: claude-sonnet-4-6   # Modelo a usar (según el provider)
#                                #   anthropic: claude-sonnet-4-6, claude-opus-4-7, etc.
#                                #   openai: gpt-4o, gpt-4o-mini
#                                #   groq: llama-4-scout-17b-16e-instruct, etc.
#     prompt_template: null      # Prompt personalizado. null = usar el prompt español
#                                # built-in del adaptador.
#     # api_key → global.secrets.yaml bajo photos.scene.api_key
#
#   dedup:
#     enabled: true              # Habilita el job nocturno de deduplicación
#     schedule: "0 3 * * *"      # Cron del job (expresión croniter)
#     similarity_threshold: 0.70 # Score mínimo entre centroides para reportar par duplicado


# =============================================================================
# CONFIGURACIÓN POR AGENTE — config/agents/{id}.yaml
# =============================================================================
# Los campos de abajo son propios de cada agente.
# =============================================================================

# id: "general"
# name: "Iñaki-g"
# description: "Asistente personal de uso general"
# system_prompt: |
#   Eres Iñaki, un asistente personal inteligente.
#
# # Override LLM — solo campos que cambian, el resto se hereda del global
# llm:
#   model: "anthropic/claude-3-5-haiku"
#   max_tokens: 4096
#
# # El agente puede rotar una credencial del registry individualmente:
# providers:
#   groq: { api_key: "gsk_clave_del_agente..." }
#
# memory:
#   enabled: true
#
# workspace:
#   path: "~/inaki-workspace/agents/coder"
#   containment: "strict"
#
# channels:
#   telegram:
#     allowed_user_ids: ["123456789"]
#     allowed_chat_ids: []      # Grupos autorizados (IDs negativos grandes).
#                               # Vacío = bot solo responde en privado.
#                               # Para obtener el chat_id: agregar el bot al grupo
#                               # y mandar `/chatid` (bypasea esta whitelist pero
#                               # respeta allowed_user_ids).
#     reactions: true
#     voice_enabled: true
#     # token → agents/{id}.secrets.yaml
#
#     # -------------------------------------------------------------------------
#     # [channels.telegram.broadcast] — Canal de broadcast entre asistentes
#     # -------------------------------------------------------------------------
#     # OPCIONAL. Permite a múltiples instancias de Iñaki (cada una en su
#     # Raspberry, en la MISMA LAN) verse mutuamente en un grupo Telegram
#     # compartido. Necesario porque la Bot API de Telegram NO entrega a un bot
#     # los mensajes de OTROS bots — se necesita un canal lateral.
#     #
#     # Topología: estrella (un server, N clients). Wire: JSON line-delimited
#     # sobre TCP, firmado HMAC-SHA256 con ventana de frescura de 60s
#     # (requiere NTP sincronizado en todas las Pis — falla silenciosa con
#     # warning en logs si hay drift > 60s).
#     #
#     # Un broadcast: port XOR remote. No ambos, no ninguno si el bloque existe.
#     # Dos canales del MISMO agente no pueden declarar el mismo `broadcast.port`.
#     #
#     # Modos de behavior:
#     #   listen      — recibe del broadcast, pero NO responde en Telegram.
#     #                 Útil para un "oyente" pasivo o un agente de análisis.
#     #   mention     — (DEFAULT) responde solo si lo mencionan (@bot_username
#     #                 o text_mention). Modo seguro para grupos con varios bots.
#     #   autonomous  — responde siempre que considere que aporta algo. El LLM
#     #                 puede responder EXACTAMENTE `[SKIP]` cuando no tiene nada
#     #                 útil — el sistema detecta el marcador y no envía nada.
#     #                 ⚠ Combinar SIEMPRE con `rate_limiter` para evitar loops.
#     #                 ⚠ En autonomous, el bot también dispara el pipeline ante
#     #                 CUALQUIER mensaje broadcast recibido de otro bot. El LLM
#     #                 decide si responder (o emitir [SKIP]) leyendo el prefijo
#     #                 de origen inyectado en el user_input.
#     #
#     # --- Modo SERVER (el Iñaki que acepta conexiones) ---
#     # broadcast:
#     #   port: 6499              # Puerto TCP donde escucha (1024..65535).
#     #   auth: "shared-secret"   # Secret compartido HMAC. → SECRETS
#     #   bot_username: "inaki_dev_bot"
#     #                           # Username del bot (sin @). Usado para mention
#     #                           # detection vía message.entities de Telegram.
#     #   behavior: "mention"     # listen | mention | autonomous
#     #   rate_limiter: 5         # Máx respuestas POR VENTANA por (agent_id,
#     #                           # chat_id). Exactamente N pasan; la N+1 se
#     #                           # bloquea hasta que la ventana expire. Aplica a
#     #                           # mensajes entrantes Telegram y a triggers
#     #                           # broadcast.
#     #   rate_limiter_window: 30 # Duración de la ventana en segundos (default
#     #                           # 30). ⚠ En behavior=autonomous, un ciclo
#     #                           # bot-to-bot suele tomar 15-40s (flush delay +
#     #                           # LLM + red). Si la ventana es menor que el
#     #                           # ciclo, el contador se resetea entre
#     #                           # intercambios y el limiter es inefectivo.
#     #                           # Recomendado: 300 (5min) o más.
#     #
#     # --- Modo CLIENT (el Iñaki que se conecta al server) ---
#     # broadcast:
#     #   remote:
#     #     host: "192.168.1.50:6499"  # host:port del server.
#     #     auth: "shared-secret"      # DEBE matchear el auth del server. → SECRETS
#     #   bot_username: "inaki_pro_bot"
#     #   behavior: "autonomous"
#     #   rate_limiter: 5
#     #   rate_limiter_window: 300
#     #
#     # Reconexión automática con backoff exponencial + jitter. El cliente queda
#     # reintentando hasta que el server levante — no hay feature flag; la
#     # ausencia de este bloque es el flag.
#     #
#     # Ver docs/configuracion.md y docs/broadcast-smoke.md para detalles y
#     # prueba de humo E2E (listen / mention / autonomous + rate limiter).
#
#   rest:
#     host: "0.0.0.0"
#     port: 6498
#     # auth_key → agents/{id}.secrets.yaml


# =============================================================================
# SECRETS — config/global.secrets.yaml + config/agents/{id}.secrets.yaml
# =============================================================================
# Los campos de abajo NUNCA van en archivos commiteables.
# =============================================================================

# config/global.secrets.yaml:
# providers:
#   openrouter: { api_key: "sk-or-..." }
#   groq:       { api_key: "gsk_...",  base_url: "https://api.groq.com/openai/v1" }
#   openai:     { api_key: "sk-..." }

# config/agents/general.secrets.yaml:
# channels:
#   telegram:
#     token: "7xxxxxxx:AAF..."   # Bot token de BotFather
#     broadcast:
#       auth: "shared-secret"    # HMAC shared-secret (server mode)
#       # — o bien, en modo client —
#       # remote:
#       #   auth: "shared-secret" # DEBE matchear el del server
#   rest:
#     auth_key: "sxc-..."
