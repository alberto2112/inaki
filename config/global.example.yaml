# =============================================================================
# Iñaki v2 — Configuración Global de Referencia
# =============================================================================
#
# Este fichero documenta TODOS los parámetros configurables del sistema.
# No es leído directamente — sirve como referencia canónica.
#
# Configuración real: config/global.yaml + config/agents/{id}.yaml
# Secrets: config/global.secrets.yaml + config/agents/{id}.secrets.yaml
#          (nunca commitear *.secrets.yaml — están en .gitignore)
#
# Sistema de merge (4 capas, campo a campo):
#   config/global.yaml
#       ↓
#   config/global.secrets.yaml
#       ↓
#   config/agents/{id}.yaml
#       ↓
#   config/agents/{id}.secrets.yaml
#       ↓
#   AgentConfig resuelto
# =============================================================================


# -----------------------------------------------------------------------------
# [app] — Configuración general del sistema
# -----------------------------------------------------------------------------
app:
  name: "Iñaki"               # Nombre del asistente (usado en logs y presentaciones)

  log_level: "INFO"           # Nivel de log: DEBUG | INFO | WARNING | ERROR | CRITICAL
                              # DEBUG muestra llamadas HTTP, embeddings, tool calls

  default_agent: "general"    # Agente usado por CLI sin flag --agent
                              # Debe coincidir con un archivo en config/agents/


# -----------------------------------------------------------------------------
# [llm] — Proveedor de lenguaje (LLM)
# -----------------------------------------------------------------------------
llm:
  provider: "openrouter"      # Proveedor activo. Opciones:
                              #   "openrouter" — API compatible OpenAI via openrouter.ai
                              #   "openai"     — OpenAI API directa
                              #   "ollama"     — Ollama local (sin api_key)
                              #   "groq"       — Groq API (muy rápido, modelos limitados)
                              # Añadir nuevo proveedor: crear adapters/outbound/providers/{name}.py
                              # con PROVIDER_NAME = "{name}" (descubrimiento automático)

  base_url: "https://openrouter.ai/api/v1"
                              # URL base de la API. Valores por proveedor:
                              #   openrouter: "https://openrouter.ai/api/v1"
                              #   openai:     "https://api.openai.com/v1"
                              #   ollama:     "http://localhost:11434"
                              #   groq:       "https://api.groq.com/openai/v1"

  model: "anthropic/claude-3-5-haiku"
                              # Modelo a usar. Ejemplos:
                              #   OpenRouter:  "anthropic/claude-3-5-haiku"
                              #                "anthropic/claude-sonnet-4-5"
                              #                "google/gemini-flash-1.5"
                              #                "meta-llama/llama-3.1-8b-instruct"
                              #   OpenAI:      "gpt-4o-mini", "gpt-4o"
                              #   Ollama:      "llama3.2", "mistral", "phi3"
                              #   Groq:        "llama3-8b-8192", "mixtral-8x7b-32768"

  temperature: 0.7            # Creatividad del modelo (0.0 = determinista, 1.0 = muy creativo)
                              # Recomendado: 0.3-0.5 para tareas de código, 0.7-0.9 para conversación

  max_tokens: 2048            # Máximo de tokens en la respuesta
                              # Aumentar para respuestas largas (código, análisis)
                              # Considerar coste en Pi 5 con modelos locales

  # api_key: "sk-or-..."     # API key del proveedor — MOVER A global.secrets.yaml
                              # Ollama no requiere api_key


# -----------------------------------------------------------------------------
# [embedding] — Modelo de embeddings para RAG
# -----------------------------------------------------------------------------
embedding:
  provider: "e5_onnx"         # Proveedor de embeddings. Opciones:
                              #   "e5_onnx" — multilingual-e5-small via ONNX Runtime
                              #               Recomendado para Pi 5 (local, ARM64, sin internet)
                              # Añadir proveedor: crear adapters/outbound/embedding/{name}.py
                              # con PROVIDER_NAME = "{name}"

  model_dirname: "models/e5-small"
                              # Directorio con los archivos del modelo ONNX, relativo
                              # a ~/.inaki/. Si se pone absoluto, se usa tal cual.
                              # Estructura esperada:
                              #   ~/.inaki/models/e5-small/model.onnx
                              #   ~/.inaki/models/e5-small/tokenizer.json
                              # Descargar desde HuggingFace: intfloat/multilingual-e5-small

  dimension: 384              # Dimensión del vector de embedding
                              # multilingual-e5-small → 384 (no cambiar)
                              # ⚠ Cambiar esto requiere borrar y recrear la DB de memorias

  cache_filename: "data/embedding_cache.db"
                              # Fichero SQLite del cache de embeddings, relativo a
                              # ~/.inaki/. Si se pone absoluto, se usa tal cual.


# -----------------------------------------------------------------------------
# [memory] — Memoria a largo plazo (SQLite + sqlite-vec)
# -----------------------------------------------------------------------------
memory:
  db_filename: "data/inaki.db"  # Fichero SQLite relativo a ~/.inaki/.
                              # Si se pone absoluto, se usa tal cual.
                              # Contiene tablas: memories, memory_embeddings (vec0)
                              # Memoria GLOBAL: compartida entre todos los agentes

  default_top_k: 5            # Número de recuerdos recuperados por RAG en cada turno
                              # Aumentar para más contexto (mayor coste de tokens)
                              # Disminuir para respuestas más rápidas

  digest_size: 14             # Nº de recuerdos más recientes volcados al digest markdown
                              # tras cada /consolidate. Orden: created_at DESC.

  digest_filename: "mem/last_memories.md"
                              # Fichero markdown leído por el prompt builder en cada
                              # turno, relativo a ~/.inaki/. Si se pone absoluto, se
                              # usa tal cual. Parte del principio user-data-separation:
                              # los datos del usuario viven fuera del árbol del proyecto.

  min_relevance_score: 0.5    # Umbral mínimo (0.0-1.0) para persistir un recuerdo
                              # extraído por el LLM. Hechos con relevance < umbral
                              # se descartan ANTES de generar embeddings (ahorra
                              # tokens y storage).

  schedule: "0 3 * * *"       # Cron para la consolidación global nocturna
                              # (una sola tarea que itera todos los agentes).
                              # Ejemplos:
                              #   "0 3 * * *"   — todos los días a las 03:00
                              #   "0 */6 * * *" — cada 6 horas
                              # Al arrancar el daemon se reconcilia: si cambia
                              # acá se actualiza la fila en scheduler.db.

  delay_seconds: 2            # Pausa (segundos) entre agente y agente durante
                              # la consolidación global. Evita golpear el
                              # rate-limit del proveedor LLM cuando hay varios.

  keep_last_messages: 0       # Mensajes a preservar por agente tras una
                              # consolidación exitosa. Los recuerdos extraídos
                              # ya están en la memoria vectorial, pero los
                              # últimos N mensajes quedan en `history.db` como
                              # contexto inmediato para el próximo turno.
                              #
                              # Sentinel:  0 → usar fallback del sistema (84)
                              # Cualquier valor > 0 se respeta tal cual.
                              #
                              # Sugerencia: mantener keep_last_messages ≥
                              # chat_history.max_messages, sino el prompt
                              # builder no tendrá suficientes filas para
                              # llenar su ventana tras cada consolidación.

  # enabled: true             # Flag PER-AGENT — va en agents/{id}.yaml, NO acá
                              # Controla si ese agente participa en la
                              # consolidación nocturna. Default: true.


# -----------------------------------------------------------------------------
# [chat_history] — Historial de conversación a corto plazo (SQLite)
# -----------------------------------------------------------------------------
chat_history:
  db_filename: "data/history.db"  # Fichero SQLite relativo a ~/.inaki/.
                              # Si se pone absoluto, se usa tal cual.
                              # Separado de inaki.db (que usa sqlite-vec).

  max_messages: 21            # Últimos N mensajes inyectados al LLM (0 = sin límite)


# -----------------------------------------------------------------------------
# [tools] — Configuración de selección de tools vía RAG
# -----------------------------------------------------------------------------
tools:
  rag_min_tools: 10             # Nº mínimo de tools registradas para activar RAG
                                # Si hay ≤ este valor, se envían TODAS al LLM
  rag_top_k: 5                  # Nº máximo de tools seleccionadas por RAG
  rag_min_score: 0.0            # Score mínimo de cosine similarity (0.0-1.0)
                                # para incluir una tool. 0.0 = sin filtro.
                                # Recomendado: 0.3-0.5 para filtrar ruido.
  sticky_ttl: 3                 # Turnos que una tool seleccionada por RAG sigue
                                # disponible aunque el RAG no la re-seleccione.
                                # 0 = feature deshabilitada.
                                # N > 0 = la tool sobrevive N turnos; si el RAG la
                                # vuelve a elegir, el TTL se refresca al máximo.
                                # Útil para follow-ups cortos ("y del siguiente?",
                                # "sí") donde el embedding del último user_input
                                # no tiene señal suficiente. Recomendado: 3-5.
  tool_call_max_iterations: 5   # Máx. iteraciones del tool-loop por turno
  circuit_breaker_threshold: 2  # Fallos consecutivos antes de cortar el loop


# -----------------------------------------------------------------------------
# [skills] — Configuración de selección de skills vía RAG
# -----------------------------------------------------------------------------
skills:
  rag_min_skills: 10            # Nº mínimo de skills cargadas para activar RAG
                                # Si hay ≤ este valor, se inyectan TODAS al prompt
  rag_top_k: 3                  # Nº máximo de skills seleccionadas por RAG
  rag_min_score: 0.0            # Score mínimo de cosine similarity (0.0-1.0)
                                # para incluir una skill. 0.0 = sin filtro.
                                # Recomendado: 0.3-0.5 para filtrar ruido.
  sticky_ttl: 3                 # Turnos que una skill seleccionada por RAG sigue
                                # inyectada en el system prompt aunque el RAG no
                                # la re-seleccione. 0 = feature deshabilitada.
                                # N > 0 = la skill sobrevive N turnos; si el RAG
                                # la vuelve a elegir, el TTL se refresca al máximo.
                                # Útil para follow-ups cortos ("y del siguiente?",
                                # "sí") donde el embedding del último user_input
                                # no tiene señal suficiente. Recomendado: 3-5.


# -----------------------------------------------------------------------------
# [rag] — Políticas transversales al pipeline RAG (skills + tools)
# -----------------------------------------------------------------------------
rag:
  min_words_threshold: 0        # Mínimo de palabras del user_input para activar
                                # el cálculo de embedding y la re-selección RAG.
                                # Por debajo de ese umbral (y si existe una
                                # selección sticky del turno previo), se saltea
                                # el embedding y se hereda la selección anterior
                                # intacta — sin decrementar TTL ni persistir
                                # estado. 0 = feature deshabilitada (el RAG corre
                                # siempre, comportamiento histórico).
                                #
                                # Motivación: en follow-ups cortos ("sí", "dale",
                                # "y eso?") el embedding tiene poca señal y
                                # generalmente el contexto es el mismo del turno
                                # anterior. Skipear ahorra una llamada al
                                # embedder y evita "resetear" la selección.
                                #
                                # Palabra = len(user_input.split()).
                                #
                                # Primer turno con sticky vacío → el RAG corre
                                # normalmente aunque el input sea corto (no hay
                                # contexto del cual heredar).
                                #
                                # Recomendado: 5 para activar; 0 para desactivar.


# -----------------------------------------------------------------------------
# [workspace] — Directorio de trabajo del agente (sandbox de las tools de FS)
# -----------------------------------------------------------------------------
#
# Define DÓNDE operan las tools de filesystem (read_file, write_file, patch_file).
# Los paths relativos del LLM se resuelven contra `workspace.path`, NO contra el
# cwd del proceso. Esto permite correr múltiples agentes/sub-agentes en paralelo
# en el mismo proceso sin que se pisen los directorios.
#
# Cada agente puede overrridear `path` y/o `containment` en su `agents/{id}.yaml`
# para aislar su scope del resto.
# -----------------------------------------------------------------------------
workspace:
  path: "~/inaki-workspace"   # Raíz del workspace. Se crea si no existe.
                              # Soporta expansión de `~` (home del usuario).
                              # Ejemplos:
                              #   "~/inaki-workspace"           ← default
                              #   "/srv/inaki/projects/alpha"   ← producción dedicada
                              #   "~/Documents/inaki"           ← usuario desktop

  containment: "strict"       # Guard de contención para paths absolutos y
                              # escapes via `..`. Modos:
                              #   "strict" → bloquea cualquier path fuera del
                              #              workspace con un error. Recomendado
                              #              en PRODUCCIÓN — evita que el LLM
                              #              toque archivos sensibles del sistema
                              #              (p.ej. `/etc/passwd`, `~/.ssh/`).
                              #
                              #   "warn"   → loggea warning pero permite el
                              #              acceso. Útil en desarrollo para
                              #              detectar qué paths se están saliendo
                              #              antes de endurecer a strict.
                              #
                              #   "off"    → sin check. Solo para debugging
                              #              local — NO usar en producción.


# -----------------------------------------------------------------------------
# [delegation] — Delegación agente-a-agente (defaults globales)
# -----------------------------------------------------------------------------
#
# Controla los valores por defecto para la ejecución de sub-agentes delegados.
# Per-agent `delegation.enabled: true` y `allowed_targets: [...]` siguen siendo
# necesarios en cada agents/{id}.yaml para habilitar la delegación en ese agente.
#
# Nota: NO existe campo `max_depth` — la prevención de recursión es estructural
# (el tool `delegate` se filtra automáticamente de los schemas del sub-agente).
#
# delegation:
#   max_iterations_per_sub: 10   # máx. iteraciones del tool-loop por llamada delegada
#   timeout_seconds: 60          # presupuesto de reloj por llamada delegada (asyncio.wait_for)


# -----------------------------------------------------------------------------
# [admin] — Admin server del daemon (endpoints de gestión)
# -----------------------------------------------------------------------------
admin:
  host: "127.0.0.1"             # Interfaz de escucha del admin server
                                # "127.0.0.1" = solo loopback (recomendado en producción)
                                # "0.0.0.0"   = todas las interfaces (con cuidado)

  port: 6497                    # Puerto del admin server
                                # Producción Pi 5: mantener en 6497 o cambiar si hay conflicto

  chat_timeout: 300.0           # Timeout en segundos para turnos de chat vía REST
                                # (POST /admin/chat/turn). El CLI espera hasta este tiempo
                                # antes de levantar DaemonTimeoutError.
                                # Aumentar para modelos locales lentos (Raspberry Pi).
                                # Default: 300 (5 minutos)

  # auth_key: "clave-secreta"   # Clave para el header X-Admin-Key → MOVER A global.secrets.yaml


# -----------------------------------------------------------------------------
# [transcription] — Proveedor de transcripción de audio (voz en Telegram)
# -----------------------------------------------------------------------------
#
# Habilita la transcripción de mensajes de voz, audio y video_note en el canal
# de Telegram. Se activa cuando `channels.telegram.voice_enabled: true` en el
# agente (default). Si un agente tiene `voice_enabled: true` sin bloque
# `transcription:` resuelto, el bootstrap falla con un error claro.
#
# ⚠ PRIVACIDAD: el audio se envía al proveedor externo (ej. Groq). Si el
# contenido es sensible, poné `channels.telegram.voice_enabled: false` en ese
# agente, o elegí un proveedor local cuando exista.
#
# transcription:
#   provider: "groq"            # Proveedor activo. Opciones:
#                               #   "groq" — Whisper vía Groq API (rápido, barato)
#                               # Añadir proveedor: crear adapters/outbound/transcription/{name}.py
#                               # con PROVIDER_NAME = "{name}" (descubrimiento automático).
#
#   model: "whisper-large-v3-turbo"
#                               # Modelo de transcripción. Ejemplos Groq:
#                               #   "whisper-large-v3-turbo"  — rápido, multilingüe
#                               #   "whisper-large-v3"         — más preciso, más lento
#
#   base_url: "https://api.groq.com/openai/v1"
#                               # URL base del proveedor. Default para Groq.
#
#   language: "es"              # Código ISO-639-1 del idioma esperado (opcional).
#                               # Si es null, el proveedor autodetecta.
#                               # Recomendado fijarlo ("es", "en") para mejor accuracy.
#
#   timeout_seconds: 60         # Timeout en segundos para la llamada HTTP.
#                               # Aumentar si mandás audios largos o la red es lenta.
#
#   max_audio_mb: 25            # Tamaño máximo permitido del audio (MB).
#                               # Audios más grandes se rechazan ANTES de llamar al
#                               # proveedor (reacción ❌ + mensaje al usuario).
#                               # Límite de Groq: 25 MB.
#
#   # api_key: "gsk_..."        # API key del proveedor → MOVER A global.secrets.yaml


# -----------------------------------------------------------------------------
# [user] — Preferencias del usuario
# -----------------------------------------------------------------------------
user:
  # timezone: "America/Argentina/Buenos_Aires"
                                # Timezone IANA usada por el scheduler para
                                # interpretar expresiones naturales ("mañana a
                                # las 9") y cron strings.
                                #
                                # Si se deja vacío o se omite, se autodetecta
                                # desde el host (vía tzlocal) con fallback a
                                # "UTC" si no se puede detectar.
                                #
                                # Listado de zonas válidas:
                                #   https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
                                #
                                # Ejemplos: "Europe/Madrid", "America/New_York",
                                # "Asia/Tokyo", "UTC".


# =============================================================================
# CONFIGURACIÓN POR AGENTE — config/agents/{id}.yaml
# =============================================================================
# Los campos de abajo son propios de cada agente.
# Se definen en config/agents/{id}.yaml, no en global.yaml.
# El agente puede sobrescribir cualquier campo de las secciones anteriores.
# =============================================================================

# [agente] — Identidad del agente (requerido en cada agents/{id}.yaml)
# id: "general"               # Identificador único (= nombre del archivo sin .yaml)
# name: "Iñaki-g"             # Nombre para mostrar en CLI y logs
# description: "Asistente personal de uso general"
# system_prompt: |            # Prompt base del agente (requerido, sin valor por defecto)
#   Eres Iñaki, un asistente personal inteligente.
#   Eres conciso, directo y útil.
#
# # Override LLM — solo campos que cambian, el resto se hereda del global
# llm:
#   model: "anthropic/claude-3-5-haiku"
#   max_tokens: 4096           # Los agentes dev pueden necesitar más tokens para código
#
# # Override de memoria — único flag válido per-agent
# memory:
#   enabled: true              # Si false, este agente NO entra en la
#                              # consolidación nocturna global. Default: true.
#
# # Override de workspace — aislar el scope de FS de este agente
# workspace:
#   path: "~/inaki-workspace/agents/coder"   # cada sub-agente con su raíz propia
#   containment: "strict"                    # se puede endurecer/relajar por agente
#
# # Canales de comunicación para este agente
# channels:
#
#   telegram:
#     allowed_user_ids: ["123456789", "987654321"]
#                             # Lista de Telegram user IDs autorizados
#                             # Vacío ([]) = todos pueden interactuar
#     reactions: true         # Reaccionar con emojis (👀 procesando, ✅ ok, ❌ error,
#                             # 👂 transcribiendo audio)
#     debug: false            # Log de mensajes entrantes y salientes
#     voice_enabled: true     # Acepta mensajes de voz/audio/video_note y los
#                             # transcribe (requiere bloque [transcription]).
#                             # Ponelo en false para que el agente ignore audios
#                             # (drop silencioso — ni reacción ni reply).
#                             # Default: true.
#     # token → en agents/{id}.secrets.yaml
#
#   rest:
#     host: "0.0.0.0"         # Escuchar en todas las interfaces (para acceso desde Android)
#     port: 6498              # Puerto del servidor FastAPI de este agente
#                             # Cada agente debe tener un puerto diferente
#     # auth_key → en agents/{id}.secrets.yaml


# =============================================================================
# SECRETS — config/global.secrets.yaml + config/agents/{id}.secrets.yaml
# =============================================================================
# Los campos de abajo NUNCA van en archivos commiteables.
# Copiar los .example y rellenar con valores reales:
#   cp config/global.secrets.yaml.example config/global.secrets.yaml
#   cp config/agents/general.secrets.yaml.example config/agents/general.secrets.yaml
# =============================================================================

# config/global.secrets.yaml:
# llm:
#   api_key: "sk-or-..."       # API key del proveedor LLM (shared entre todos los agentes)
# transcription:
#   api_key: "gsk_..."         # API key del proveedor de transcripción (solo si voice_enabled)

# config/agents/general.secrets.yaml:
# channels:
#   telegram:
#     token: "7xxxxxxx:AAF..." # Bot token de BotFather (@BotFather en Telegram)
#   rest:
#     auth_key: "sxc-..."      # Clave para header X-API-Key en peticiones a la REST API
