app:
  name: "Iñaki"
  log_level: "INFO"
  data_dir: "data"
  models_dir: "models"
  skills_dir: "skills"
  default_agent: "general"

# NOTA: workspace.path no está respaldado por ninguna clase config — ignorado por Pydantic
workspace:
  path: "/Users/alberto/tmp/inaki_ws/"

llm:
  provider: "groq"
  base_url: null            # override para endpoints custom (default: usa el del provider)
  model: "openai/gpt-oss-120b"
  temperature: 0.7
  max_tokens: 2048
  # api_key: en global.secrets.yaml

embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  base_url: "https://api.openai.com/v1"
  dimension: 384    # MRL: 384 de 1536 — compatible con schema SQLite existente
  # api_key: en global.secrets.yaml

  # Alternativa local (sin internet, recomendado para Pi 5 offline):
  # provider: "e5_onnx"
  # model_path: "models/e5-small"
  # dimension: 384

memory:
  db_path: "~/.inaki/mem/inaki.db"
  default_top_k: 7
  min_relevance_score: 0.5

history:
  db_path: "~/.inaki/mem/history.db"
  max_messages_in_prompt: 21  # últimos N mensajes inyectados al LLM (0 = sin límite)

skills:
  rag_min_skills: 5    # activa el selector RAG si hay más de N skills disponibles
  rag_top_k: 3         # cuántas skills seleccionar cuando el RAG está activo

tools:
  rag_min_tools: 10          # activa el selector RAG si hay más de N tools disponibles
  rag_top_k: 5               # cuántas tools seleccionar cuando el RAG está activo
  tool_call_max_iterations: 5  # máximo de iteraciones en el loop de tool calls

scheduler:
  enabled: true
  db_path: "~/.inaki/scheduler.db"
  max_retries: 3
  output_truncation_size: 65536
