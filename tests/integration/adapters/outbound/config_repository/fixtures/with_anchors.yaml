# Configuración con anchors y aliases YAML

# Base compartida de parámetros LLM
defaults: &base_llm
  temperature: 0.7
  max_tokens: 2048

# LLM principal — hereda los defaults
llm:
  <<: *base_llm
  provider: openrouter
  model: anthropic/claude-3-5-haiku

# LLM de memoria — mismos defaults, modelo diferente
memory_llm:
  <<: *base_llm
  provider: groq
  model: llama3-70b-8192
